<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <title>Sorteador de números</title>
</head>

<body>
    <main>
        <img src="assets/dado.png" alt="dados">
        <h1>Lucky Number</h1>
        <h2 class="h2-sortear">Sortear um número</h2>

        <div>
            <input class="input-min" placeholder="min" type="number">
            <input class="input-max" placeholder="max" type="number">
        </div>

        <button class="button-generate">Sortear</button>

        <h2 class="h2-resultado">Resultado</h2>
        <p id="result">...</p>
    </main>

    <div id="alert" class="alert">
        <p id="alert-text">O valor máximo deve ser maior que o valor mínimo!</p>
        <button onclick="fecharAlert()">OK</button>
    </div>

</body>
<script src="scripts.js"></script>
</html>
